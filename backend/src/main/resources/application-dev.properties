spring.config.import=optional:file:.env[.properties]

lifelinq.devAuth.enabled=true
lifelinq.cors.allowed-origins=http://localhost:19006,http://localhost:8081

spring.datasource.url=jdbc:h2:mem:lifelinq;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

lifelinq.jwt.secret=dev-secret
lifelinq.jwt.ttlSeconds=900
lifelinq.auth.refresh.secret=dev-refresh-secret

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
lifelinq.auth.mail.from=${MAIL_FROM:LifeLinq <no-reply@lifelinq.app>}

lifelinq.oauth.google.client-id=${GOOGLE_CLIENT_ID:}
lifelinq.oauth.google.client-secret=${GOOGLE_CLIENT_SECRET:}

lifelinq.oauth.apple.client-id=${APPLE_CLIENT_ID:}
lifelinq.oauth.apple.client-secret=${APPLE_CLIENT_SECRET:}
