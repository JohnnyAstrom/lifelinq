# Shared defaults (profile-specific settings live in application-<profile>.properties)
# If access logs are enabled, use request path without query-string to avoid leaking tokens.
server.tomcat.accesslog.pattern=%h %l %u %t "%m %U %H" %s %b
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
spring.flyway.enabled=false
